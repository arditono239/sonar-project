name: ci
on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests + coverage
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
      
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
           SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
           SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  k6-smoke:
  # optional: jalankan kecil saat push ke main
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        needs: build-test-analyze
        steps: 
          - uses: actions/checkout@v4
          - name: Start app
            run: |
              npm ci
              npm start &
              sleep 5 
          - name: Run k6 smoke
            run: docker run --rm --network host -e BASE_URL=http://localhost:9000 -v ${{ github.workspace }}:/work -w /work grafana/k6:latest run loadtest/scripts/smoke.js
        
        